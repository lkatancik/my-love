<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Photo Memories</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #ffe6f0;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #d63384;
            margin-bottom: 20px;
        }
        .album-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .album {
            background: #fff0f5;
            border: 2px solid #ffc1cc;
            border-radius: 20px;
            padding: 20px;
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .album:hover {
            transform: scale(1.05);
        }
        .album h2 {
            margin: 0;
            color: #e75480;
        }
        .gallery {
            display: none;
            margin-top: 30px;
        }
        .gallery img {
            max-width: 90%;
            height: auto;
            margin: 20px auto;
            border-radius: 15px;
            border: 4px solid #ffc1cc;
            display: block;
        }
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #ff99bb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>📸 Photo Memories</h1>
    <div class="album-container">
        <div class="album" onclick="showGallery('us')">
            <h2>💞 Us Together</h2>
        </div>
        <div class="album">
            <h2>💁‍♂️ Just You</h2>
            <p>Coming soon</p>
        </div>
        <div class="album">
            <h2>💁‍♀️ Just Her</h2>
            <p>Coming soon</p>
        </div>
        <a href="index.html" class="back-button">← Back to Home</a>
    </div>

    <div class="gallery" id="us">
        <h2>💞 Us Together</h2>
        <img src="us/2B6A0773-F47E-448E-A4E9-6D1D4E5FEA35.jpg" alt="Us 1" />
  <img src="us/595B4C28-32A2-493D-9ACE-39395BFC318E.JPG" alt="Us 2" />
  <img src="us/us1.jpg" alt="Us 3" />
  <img src="us/us2.jpg" alt="Us 4" />
  <img src="us/us3.jpg" alt="Us 5" />
        <br>
        <a class="back-button" href="photo-memories.html">← Back to Albums</a>
    </div>

    <script>
        function showGallery(id) {
            document.querySelector('.album-container').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
